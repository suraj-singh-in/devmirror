        <rect class="fi" x="-14" y="185" width="28" height="14" rx="3" fill="#F0F4FF" style="--delay:0.6s"/>
        <rect class="s draw" x="-14" y="185" width="28" height="14" rx="3" stroke-width="3.5" style="--len:88;--dur:0.25s;--delay:0.6s"/>
        <path class="s draw" d="M -14,72 L -14,30 Q -14,18 -2,18 L 20,18" stroke-width="5" style="--len:70;--dur:0.3s;--delay:1.3s"/>
        <path class="s draw" d="M 20,18 Q 60,18 80,-20 Q 110,-65 150,-90 Q 195,-118 240,-120" stroke-width="5" style="--len:280;--dur:0.5s;--delay:1.6s"/>
