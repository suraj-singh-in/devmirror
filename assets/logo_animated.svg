        <rect class="fi" x="-66" y="96" width="132" height="78" rx="4" fill="#ffffff" style="--delay:0.5s"/>
        <rect class="s draw" x="-66" y="96" width="132" height="78" rx="4" stroke-width="3.5" style="--len:440;--dur:0.5s;--delay:0.5s"/>
        <circle class="fi" cx="0" cy="135" r="28" fill="#F0F4FF" style="--delay:0.8s"/>
        <circle class="s draw" cx="0" cy="135" r="28" stroke-width="4" style="--len:180;--dur:0.4s;--delay:0.8s"/>
        <circle class="fi" cx="0" cy="135" r="16" fill="#ffffff" style="--delay:1.0s"/>
        <circle class="s draw" cx="0" cy="135" r="16" stroke-width="3" style="--len:105;--dur:0.3s;--delay:1.0s"/>
        <circle class="fi" cx="0" cy="135" r="5" fill="#0D1F3C" stroke="none" style="--delay:1.2s"/>
        <line class="s draw" x1="-56" y1="110" x2="-56" y2="170" stroke-width="2.5" style="--len:62;--dur:0.2s;--delay:0.9s;opacity:0.2"/>
        <line class="s draw" x1="-42" y1="102" x2="-42" y2="168" stroke-width="2.5" style="--len:68;--dur:0.2s;--delay:0.95s;opacity:0.2"/>
        <line class="s draw" x1="42" y1="102" x2="42" y2="168" stroke-width="2.5" style="--len:68;--dur:0.2s;--delay:1.0s;opacity:0.2"/>
