<?xml
version="1.0" encoding="UTF-8"?>
<svg id="gram" width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Gramophone icon â€” animated draw-on</title>
    <desc>Gramophone with horn, dark navy strokes on white, draw-on stroke animation</desc>
    <defs>
        <style>
            .s {
                fill: none;
                stroke: #0D1F3C;
                stroke-linecap: round;
                stroke-linejoin: round
            }

            .draw {
                stroke-dasharray: var(--len);
                stroke-dashoffset: var(--len);
                animation: draw var(--dur) var(--delay) ease forwards
            }

            @keyframes draw {
                to {
                    stroke-dashoffset: 0
                }
            }

            .fi {
                opacity: 0;
                animation: fi 0.3s var(--delay) ease forwards
            }

            @keyframes fi {
                to {
                    opacity: 1
                }
            }
        </style>
    </defs>
    <rect width="680" height="680" fill="transparent"/>
    <g transform="translate(340,340)">
        <rect class="fi" x="-90" y="80" width="180" height="110" rx="8" fill="#F0F4FF" style="--delay:0.1s"/>
