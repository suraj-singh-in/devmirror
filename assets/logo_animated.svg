        <circle class="s draw" cx="255" cy="-110" r="18" stroke-width="4" style="--len:114;--dur:0.3s;--delay:3.2s"/>
        <circle class="fi" cx="255" cy="-110" r="8" fill="#1D9E75" stroke="#1D9E75" stroke-width="2.5" style="--delay:3.5s"/>
        <line class="s draw" x1="-90" y1="190" x2="-110" y2="230" stroke-width="4" style="--len:46;--dur:0.2s;--delay:0.7s"/>
