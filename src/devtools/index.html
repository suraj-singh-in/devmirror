<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>devmirror DevTools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <!-- __DEVTOOLS_CSS__ -->
</head>
<body>

<!-- ARIA live region for state announcements (§13) -->
<div role="status" aria-live="polite" class="sr-only" id="aria-status"></div>

<!-- ── TOPBAR ─────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo-wordmark">devmirror</span>
    <span class="conn-dot" id="logo-dot" data-state="waiting" aria-hidden="true"></span>
  </div>

  <div class="topbar-center">
    <div class="device-pill" id="topbar-pill" data-state="waiting">
      <span class="conn-dot" id="topbar-pill-dot" data-state="waiting" aria-hidden="true"></span>
      <span class="pill-text" id="topbar-pill-text">Waiting for device&hellip;</span>
    </div>
  </div>

  <div class="topbar-right">
    <button class="topbar-btn" id="btn-reload"
            aria-label="Reload phone" aria-disabled="true">
      &#x21BA; Reload
    </button>
    <button class="topbar-btn" id="btn-disconnect"
            aria-label="Disconnect" aria-disabled="true">
      &#x2297; Disconnect
    </button>
  </div>
</header>

<!-- ── TAB BAR ────────────────────────────────────────────────────────────── -->
<nav class="tabbar">
  <div class="tabs" role="tablist" aria-label="DevTools panels">
    <button class="tab" id="tab-device"
            role="tab" aria-selected="true" aria-controls="panel-device" tabindex="0">
      Device
    </button>
    <button class="tab" id="tab-console"
            role="tab" aria-selected="false" aria-controls="panel-console" tabindex="-1">
      Console
      <span class="tab-badge" id="console-badge" aria-hidden="true"></span>
    </button>
    <button class="tab" id="tab-touch"
            role="tab" aria-selected="false" aria-controls="panel-touch" tabindex="-1">
      Touch
    </button>
    <button class="tab" id="tab-network"
            role="tab" aria-selected="false" aria-controls="panel-network" tabindex="-1">
      Network
      <span class="tab-badge tab-badge--network" id="network-badge" aria-hidden="true"></span>
    </button>
    <button class="tab" id="tab-dom"
            role="tab" aria-selected="false" aria-controls="panel-dom" tabindex="-1">
      DOM
    </button>
    <button class="tab" id="tab-camera"
            role="tab" aria-selected="false" aria-controls="panel-camera" tabindex="-1"
            hidden>
      Camera
    </button>
  </div>

  <div class="tabbar-pill-wrap">
    <div class="device-pill" id="tabbar-pill" data-state="waiting">
      <span class="conn-dot" id="tabbar-pill-dot" data-state="waiting" aria-hidden="true"></span>
      <span class="pill-text" id="tabbar-pill-text">Waiting for device&hellip;</span>
    </div>
  </div>
</nav>

<!-- ── RECONNECT NOTICE (§10.3) ─────────────────────────────────────────── -->
<div class="reconnect-bar" id="reconnect-bar" role="alert" hidden>
  <i class="ti ti-alert-triangle" aria-hidden="true"></i>
  Lost connection &mdash; attempting to reconnect&hellip;
</div>

<!-- ── PANELS (content injected by proxy from components/tabs/*/index.html) ── -->
<main class="panels">

  <div class="panel" id="panel-device" role="tabpanel" aria-labelledby="tab-device"><!-- __TAB_device__ --></div>

  <div class="panel" id="panel-console" role="tabpanel" aria-labelledby="tab-console" hidden><!-- __TAB_console__ --></div>

  <div class="panel" id="panel-touch" role="tabpanel" aria-labelledby="tab-touch" hidden><!-- __TAB_touch__ --></div>

  <div class="panel" id="panel-network" role="tabpanel" aria-labelledby="tab-network" hidden><!-- __TAB_network__ --></div>

  <div class="panel" id="panel-dom" role="tabpanel" aria-labelledby="tab-dom" hidden><!-- __TAB_dom__ --></div>

  <div class="panel" id="panel-camera" role="tabpanel" aria-labelledby="tab-camera" hidden><!-- __TAB_camera__ --></div>

</main>

<script>
  var BRIDGE_PORT = '__BRIDGE_PORT__';

  // ── DOM refs ─────────────────────────────────────────────────────────────
  var logoDot       = document.getElementById('logo-dot');
  var topbarPill    = document.getElementById('topbar-pill');
  var topbarDot     = document.getElementById('topbar-pill-dot');
  var topbarText    = document.getElementById('topbar-pill-text');
  var tabbarPill    = document.getElementById('tabbar-pill');
  var tabbarDot     = document.getElementById('tabbar-pill-dot');
  var tabbarText    = document.getElementById('tabbar-pill-text');
  var btnReload     = document.getElementById('btn-reload');
  var btnDisconnect = document.getElementById('btn-disconnect');
  var reconnectBar  = document.getElementById('reconnect-bar');
  var ariaStatus    = document.getElementById('aria-status');

  // Device tab refs (elements injected from components/tabs/device/index.html)
  var deviceGrid   = document.getElementById('device-grid');
  var cardScreen   = document.getElementById('card-screen');
  var cardViewport = document.getElementById('card-viewport');
  var cardDpr      = document.getElementById('card-dpr');
  var cardOs       = document.getElementById('card-os');
  var cardUa       = document.getElementById('card-ua');

  // ── Console tab state ─────────────────────────────────────────────────────
  var consoleLogs      = [];       // source array — never mutated for filtering
  var consoleLogsCapped = false;   // true once LOG_CAP was exceeded
  var consoleFilter    = 'all';    // 'all' | 'log' | 'warn' | 'error'
  var consoleSearch    = '';       // current search string
  var consoleSelectedId = null;    // id of the currently selected log entry
  var consoleUnread    = 0;        // logs received while Console tab was inactive
  var preserveLogs     = false;    // if true, keep logs on phone_reconnected
  var LOG_CAP          = 5000;
  var logIdCounter     = 0;
  var consoleUIReady   = false;    // true after consoleInitUI() has run

  // Console DOM refs (populated by consoleInitUI)
  var consoleLogListEl    = null;
  var consoleSearchEl     = null;
  var preserveToggleEl    = null;
  var consoleClearBtnEl   = null;
  var consolePaneEl       = null;
  var emptyConsoleDetailEl = null;
  var consoleDetailViewEl = null;
  var detailMsgEl         = null;
  var detailMetaEl        = null;
  var detailBodyScrollEl  = null;

  var TAB_IDS = ['device', 'console', 'touch', 'network', 'dom', 'camera'];

  var tabEls   = {};
  var panelEls = {};
  var emptyEls = {};
  TAB_IDS.forEach(function (id) {
    tabEls[id]   = document.getElementById('tab-'   + id);
    panelEls[id] = document.getElementById('panel-' + id);
    emptyEls[id] = document.getElementById('empty-' + id);
  });

  // ── State ─────────────────────────────────────────────────────────────────
  var connState            = 'waiting'; // 'waiting' | 'connected' | 'disconnected'
  var lastDevice           = null;      // last dimensions/phone_connected payload
  var activeTab            = 'device';
  var pendingPhoneAnnounce = false;     // true after phone_connected, until dims arrive

  // Empty state content per tab per connection state (§10.2)
  var EMPTY_CFG = {
    device: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: null, // Device tab shows card grid when connected
    },
    console: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: null, // console-pane handles the connected state internally
    },
    touch: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: null, // touch-content + touch-no-data overlay handle the connected state
    },
    network: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: null, // network-pane handles the connected state internally
    },
    dom: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: null, // dom-content manages its own sidebar empty states internally
    },
    camera: {
      waiting:   ['ti-device-mobile-off', 'Waiting for phone',  'Scan the QR code in your terminal to connect'],
      connected: ['ti-camera',            'Camera not started',  'Click \u2018Start camera\u2019 to begin streaming'],
    },
  };

  // ── Helpers ───────────────────────────────────────────────────────────────

  /**
   * Builds the device pill text from a dimensions payload.
   * Format: Model · WxH · DPRx · OS  (§12.6)
   *
   * @param {object} device
   * @returns {string}
   */
  function buildPillText(device) {
    if (!device) { return 'Waiting for device\u2026'; }
    var ua = device.ua || '';
    var model = 'Unknown';
    var os    = '';
    var iosM  = ua.match(/CPU iPhone OS (\d+)_(\d+)/);
    var ipadM = ua.match(/iPad.*CPU OS (\d+)_(\d+)/);
    var droidM = ua.match(/Android ([\d.]+);\s*([^)]+)\)/);
    if (iosM)       { model = 'iPhone'; os = 'iOS '    + iosM[1]  + '.' + iosM[2]; }
    else if (ipadM) { model = 'iPad';   os = 'iPadOS ' + ipadM[1] + '.' + ipadM[2]; }
    else if (droidM){ model = droidM[2].trim(); os = 'Android ' + droidM[1]; }
    return model + ' \u00b7 ' + device.width + '\u00d7' + device.height +
           ' \u00b7 ' + device.dpr + 'x' + (os ? ' \u00b7 ' + os : '');
  }

  /**
   * Parses a raw user-agent string into "OS Version · Browser" for the OS card.
   * Simple string matching — no external library.
   *
   * @param {string} ua
   * @returns {string}
   */
  function parseOsBrowser(ua) {
    if (!ua) { return '\u2014'; }
    var iosM   = ua.match(/CPU iPhone OS (\d+)_(\d+)/);
    var ipadM  = ua.match(/iPad.*CPU OS (\d+)_(\d+)/);
    var droidM = ua.match(/Android ([\d.]+)/);
    var macM   = ua.match(/Mac OS X (\d+)[_.](\d+)/);
    var winM   = ua.match(/Windows NT ([\d.]+)/);
    function browser(ua) {
      return /CriOS/.test(ua) || /FxiOS/.test(ua) ? (/CriOS/.test(ua) ? 'Chrome' : 'Firefox')
           : /Firefox\/[\d.]/.test(ua) ? 'Firefox'
           : /Edg\/[\d.]/.test(ua)     ? 'Edge'
           : /Chrome\/[\d.]/.test(ua)  ? 'Chrome'
           : 'Safari';
    }
    if (iosM)  { return 'iOS '    + iosM[1]  + '.' + iosM[2]  + ' \u00b7 ' + browser(ua); }
    if (ipadM) { return 'iPadOS ' + ipadM[1] + '.' + ipadM[2] + ' \u00b7 ' + browser(ua); }
    if (droidM){ return 'Android ' + droidM[1] + ' \u00b7 ' + browser(ua); }
    if (macM)  { return 'macOS '  + macM[1]  + '.' + macM[2]  + ' \u00b7 ' + browser(ua); }
    if (winM)  { return 'Windows ' + winM[1]  + ' \u00b7 ' + browser(ua); }
    return '\u2014';
  }

  /**
   * Populates the Device tab card grid from a dimensions payload.
   * Safe to call on every dimensions message — updates in-place (live rotation).
   *
   * @param {object} device
   */
  function populateDeviceTab(device) {
    // Re-query lazily in case the component HTML was injected after script init.
    if (!cardScreen)   { cardScreen   = document.getElementById('card-screen'); }
    if (!cardViewport) { cardViewport = document.getElementById('card-viewport'); }
    if (!cardDpr)      { cardDpr      = document.getElementById('card-dpr'); }
    if (!cardOs)       { cardOs       = document.getElementById('card-os'); }
    if (!cardUa)       { cardUa       = document.getElementById('card-ua'); }
    if (!cardScreen)   { return; } // Elements not in DOM yet — bail safely.
    if (!device || !device.width) { return; } // No dimension data yet.
    cardScreen.textContent   = device.width + ' \u00d7 ' + device.height;
    cardViewport.textContent = device.vw    + ' \u00d7 ' + device.vh;
    cardDpr.textContent      = device.dpr   + '\u00d7';
    cardOs.textContent       = parseOsBrowser(device.ua || '');
    cardUa.textContent       = device.ua    || '\u2014';
  }

  /**
   * Updates one tab's empty state element to match the connection state.
   *
   * @param {string} tabId
   * @param {string} state  'waiting' | 'connected' | 'disconnected'
   */
  function updateEmptyState(tabId, state) {
    var el = emptyEls[tabId];
    if (!el) { return; }
    // Disconnected: keep connected-state content unchanged (§10.3)
    var key = (state === 'disconnected') ? (lastDevice ? 'connected' : 'waiting') : state;
    var cfg = EMPTY_CFG[tabId][key];
    if (!cfg) { el.style.display = 'none'; return; }
    el.style.display = '';
    el.querySelector('i').className                    = 'ti ' + cfg[0];
    el.querySelector('.empty-heading').textContent     = cfg[1];
    el.querySelector('.empty-body').textContent        = cfg[2];
  }

  // ── Touch tab state ───────────────────────────────────────────────────────
  var touchCount      = 0;
  var touchFades      = []; // [{ x, y, startTime }]
  var touchPermCanvas = null;
  var touchFadeCanvas = null;
  var touchCtxPerm    = null;
  var touchCtxFade    = null;
  var touchCountEl    = null;
  var touchNoDataEl   = null;
  var touchWrapEl     = null;
  var touchContentEl  = null;
  var touchRafId      = null;
  var touchUIReady    = false;

  // ── DOM tab state ─────────────────────────────────────────────────────────
  var domUIReady           = false;
  var domSnapshot          = null;      // Document parsed from phone's outerHTML
  var domSelectedNode      = null;      // currently selected Element in the snapshot
  var domExpandedNodes     = null;      // WeakSet — which nodes are expanded in the tree
  var domLoadingTimer      = null;      // 10-second snapshot timeout handle
  var domSearchQuery       = '';        // current element search string
  var domStylesSeq         = 0;         // increments on each request_styles to avoid stale
  var domStylesFilterQuery = '';        // current CSS property filter string
  var domActiveDetailTab   = 'styles';  // 'styles' | 'attrs'
  var domContentEl         = null;
  var domSidebarEmptyEl    = null;
  var domLoadingEl         = null;
  var domTreeEl            = null;
  var domSearchBarEl       = null;
  var domSearchInputEl     = null;
  var domDetailEmptyEl     = null;
  var domDetailViewEl      = null;
  var domBreadcrumbEl      = null;
  var domDtabStylesEl      = null;
  var domDtabAttrsEl       = null;
  var domStylesPanelEl     = null;
  var domStylesContentEl   = null;
  var domStylesFilterEl    = null;
  var domStylesLoadingEl   = null;
  var domAttrsPanelEl      = null;
  var domDetailBodyEl      = null;
  var domSnapshotBtnEl     = null;
  var domHighlightBtnEl    = null;
  var domSidebarEl         = null;
  var domResizerEl         = null;
  var domResizerDragging   = false;
  var domResizerStartX     = 0;
  var domResizerStartW     = 0;

  // ── Network tab state ─────────────────────────────────────────────────────
  var networkUIReady      = false;
  var networkRequests     = [];
  var networkCapped       = false;
  var networkPreserve     = false;
  var networkFilter       = 'all';
  var networkSearch       = '';
  var networkSelectedId   = null;
  var networkUnread       = 0;
  var networkDetailSubTab = 'request-headers';
  var networkDetailSearch = '';
  var NETWORK_CAP         = 1000;

  // Network DOM refs (populated by networkInitUI)
  var networkPaneEl       = null;
  var networkSidebarEl    = null;
  var netResizerEl        = null;
  var netResizerDragging  = false;
  var netResizerStartX    = 0;
  var netResizerStartW    = 0;
  var networkListEl       = null;
  var networkSearchEl     = null;
  var networkPreserveEl   = null;
  var networkClearBtnEl   = null;
  var netDetailEmptyEl    = null;
  var netDetailViewEl     = null;
  var netDetailUrlEl      = null;
  var netDetailMetaEl     = null;
  var netDetailSearchEl   = null;
  var netDsearchInputEl   = null;
  var netDsearchCountEl   = null;
  var netDsearchClearEl   = null;
  var netDetailContentEl  = null;

  // ── Console helpers ───────────────────────────────────────────────────────

  function consoleShortTime(ts) {
    var d = new Date(ts);
    return ':' + String(d.getSeconds()).padStart(2, '0');
  }

  function consoleFullTime(ts) {
    var d = new Date(ts);
    return [d.getHours(), d.getMinutes(), d.getSeconds()]
      .map(function(n) { return String(n).padStart(2, '0'); })
      .join(':');
  }

  function consoleGetMessage(log) {
    return log.args.join(' ');
  }

  function consoleGetFilteredLogs() {
    return consoleLogs.filter(function(log) {
      if (consoleFilter !== 'all' && log.level !== consoleFilter) { return false; }
      if (consoleSearch) {
        if (consoleGetMessage(log).toLowerCase().indexOf(consoleSearch.toLowerCase()) === -1) {
          return false;
        }
      }
      return true;
    });
  }

  function consoleBuildStackDOM(stackStr) {
    var frag = document.createDocumentFragment();
    stackStr.split('\n').forEach(function(line) {
      var t = line.trim();
      if (!t) { return; }
      var el = document.createElement('span');
      el.className = 'stack-line';
      // Highlight file:line:col references in green
      var FILE_RE = /((?:[a-zA-Z]:[/\\]|\.{0,2}[/\\])[^\s()"']+\.(?:js|mjs|cjs|ts|tsx|jsx):\d+(?::\d+)?)/g;
      var parts = t.split(FILE_RE);
      parts.forEach(function(part, i) {
        if (!part) { return; }
        if (i % 2 === 1) {
          var s = document.createElement('span');
          s.className = 'stack-file';
          s.textContent = part;
          el.appendChild(s);
        } else {
          el.appendChild(document.createTextNode(part));
        }
      });
      frag.appendChild(el);
    });
    return frag;
  }

  function consoleUpdateBadge() {
    var badge = document.getElementById('console-badge');
    if (!badge) { return; }
    var tabEl = document.getElementById('tab-console');
    if (consoleUnread === 0) {
      badge.classList.remove('visible');
      badge.textContent = '';
      if (tabEl) { tabEl.setAttribute('aria-label', 'Console'); }
    } else {
      var label = consoleUnread > 99 ? '99+' : String(consoleUnread);
      badge.textContent = label;
      badge.classList.add('visible');
      if (tabEl) {
        tabEl.setAttribute('aria-label', 'Console, ' + consoleUnread +
          ' unread log' + (consoleUnread === 1 ? '' : 's'));
      }
    }
  }

  function consoleMakeRowEl(log) {
    var row = document.createElement('div');
    row.className = 'log-row';
    row.setAttribute('role', 'listitem');
    row.setAttribute('tabindex', '0');
    row.setAttribute('data-id', String(log.id));
    row.setAttribute('aria-selected', consoleSelectedId === log.id ? 'true' : 'false');

    var badge = document.createElement('span');
    badge.className = 'level-badge';
    badge.setAttribute('data-level', log.level);
    badge.textContent = log.level;
    row.appendChild(badge);

    var preview = document.createElement('span');
    preview.className = 'log-msg-preview';
    preview.textContent = consoleGetMessage(log);
    row.appendChild(preview);

    var ts = document.createElement('span');
    ts.className = 'log-time';
    ts.textContent = consoleShortTime(log.timestamp);
    row.appendChild(ts);

    row.addEventListener('click', function() { consoleSelectLog(log.id); });
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        consoleSelectLog(log.id);
      }
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        var rows = Array.prototype.slice.call(consoleLogListEl.querySelectorAll('.log-row'));
        var idx  = rows.indexOf(row);
        var next = e.key === 'ArrowDown' ? rows[idx + 1] : rows[idx - 1];
        if (next) { next.focus(); }
      }
    });

    return row;
  }

  function consoleRenderList() {
    if (!consoleLogListEl) { return; }
    consoleLogListEl.innerHTML = '';

    if (consoleLogsCapped) {
      var notice = document.createElement('div');
      notice.className = 'console-cap-notice';
      notice.textContent = 'Log limit reached \u2014 oldest entries removed';
      consoleLogListEl.appendChild(notice);
    }

    if (consoleLogs.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'console-list-empty';
      empty.innerHTML = '<i class="ti ti-terminal-2" aria-hidden="true"></i>' +
        '<div class="console-list-empty-heading">No logs yet</div>' +
        '<div class="console-list-empty-body">Waiting for console output from the phone</div>';
      consoleLogListEl.appendChild(empty);
      return;
    }

    var filtered = consoleGetFilteredLogs();
    if (filtered.length === 0) {
      var empty2 = document.createElement('div');
      empty2.className = 'console-list-empty';
      empty2.innerHTML = '<i class="ti ti-filter-off" aria-hidden="true"></i>' +
        '<div class="console-list-empty-heading">No matching logs</div>' +
        '<div class="console-list-empty-body">Try a different filter or clear your search</div>';
      consoleLogListEl.appendChild(empty2);
      return;
    }

    var frag = document.createDocumentFragment();
    filtered.forEach(function(log) { frag.appendChild(consoleMakeRowEl(log)); });
    consoleLogListEl.appendChild(frag);
  }

  function consoleRenderDetail(log) {
    if (!emptyConsoleDetailEl) { emptyConsoleDetailEl = document.getElementById('empty-console-detail'); }
    if (!consoleDetailViewEl)  { consoleDetailViewEl  = document.getElementById('console-detail-view'); }
    if (!detailMsgEl)          { detailMsgEl          = document.getElementById('detail-msg'); }
    if (!detailMetaEl)         { detailMetaEl         = document.getElementById('detail-meta'); }
    if (!detailBodyScrollEl)   { detailBodyScrollEl   = document.getElementById('detail-body-scroll'); }

    if (!log) {
      if (emptyConsoleDetailEl) { emptyConsoleDetailEl.removeAttribute('hidden'); }
      if (consoleDetailViewEl)  { consoleDetailViewEl.setAttribute('hidden', ''); }
      return;
    }

    if (emptyConsoleDetailEl) { emptyConsoleDetailEl.setAttribute('hidden', ''); }
    if (!consoleDetailViewEl) { return; }
    consoleDetailViewEl.removeAttribute('hidden');

    var msg = consoleGetMessage(log);
    detailMsgEl.textContent = msg;

    // Meta chips: time · device · level
    detailMetaEl.innerHTML = '';

    var timeChip = document.createElement('span');
    timeChip.className = 'meta-chip';
    var clockIcon = document.createElement('i');
    clockIcon.className = 'ti ti-clock';
    clockIcon.setAttribute('aria-hidden', 'true');
    timeChip.appendChild(clockIcon);
    timeChip.appendChild(document.createTextNode(consoleFullTime(log.timestamp)));
    detailMetaEl.appendChild(timeChip);

    if (lastDevice) {
      var ua = lastDevice.ua || '';
      var model = /CPU iPhone OS/.test(ua) ? 'iPhone'
                : /iPad/.test(ua)          ? 'iPad'
                : (function() { var m = ua.match(/Android [\d.]+;\s*([^)]+)\)/); return m ? m[1].trim() : 'Device'; })();
      var devChip = document.createElement('span');
      devChip.className = 'meta-chip';
      var devIcon = document.createElement('i');
      devIcon.className = 'ti ti-device-mobile';
      devIcon.setAttribute('aria-hidden', 'true');
      devChip.appendChild(devIcon);
      devChip.appendChild(document.createTextNode(model));
      detailMetaEl.appendChild(devChip);
    }

    var levelIconName = log.level === 'error' ? 'ti-circle-x'
                      : log.level === 'warn'  ? 'ti-alert-triangle'
                      : 'ti-info-circle';
    var levelChip = document.createElement('span');
    levelChip.className = 'meta-chip' +
      (log.level === 'error' ? ' meta-chip--error' : log.level === 'warn' ? ' meta-chip--warn' : '');
    var levelIcon = document.createElement('i');
    levelIcon.className = 'ti ' + levelIconName;
    levelIcon.setAttribute('aria-hidden', 'true');
    levelChip.appendChild(levelIcon);
    levelChip.appendChild(document.createTextNode(log.level));
    detailMetaEl.appendChild(levelChip);

    // Body sections
    detailBodyScrollEl.innerHTML = '';

    // MESSAGE
    var msgSection = document.createElement('div');
    msgSection.className = 'detail-section';
    var msgLabel = document.createElement('div');
    msgLabel.className = 'section-label';
    msgLabel.textContent = 'Message';
    var msgBlock = document.createElement('div');
    msgBlock.className = 'code-block';
    msgBlock.textContent = msg;
    msgSection.appendChild(msgLabel);
    msgSection.appendChild(msgBlock);
    detailBodyScrollEl.appendChild(msgSection);

    // STACK TRACE (if error arg contains a stack)
    if (log.level === 'error' && log.args.length > 0) {
      var firstArg = log.args[0];
      if (firstArg.indexOf('\n') !== -1 && /at\s/.test(firstArg)) {
        var stackSection = document.createElement('div');
        stackSection.className = 'detail-section';
        var stackLabel = document.createElement('div');
        stackLabel.className = 'section-label';
        stackLabel.textContent = 'Stack Trace';
        var stackBlock = document.createElement('div');
        stackBlock.className = 'code-block';
        stackBlock.appendChild(consoleBuildStackDOM(firstArg));
        stackSection.appendChild(stackLabel);
        stackSection.appendChild(stackBlock);
        detailBodyScrollEl.appendChild(stackSection);
      }
    }

    // RAW ARGS
    var argsSection = document.createElement('div');
    argsSection.className = 'detail-section';
    var argsLabel = document.createElement('div');
    argsLabel.className = 'section-label';
    argsLabel.textContent = 'Raw Args';
    var argsBlock = document.createElement('div');
    argsBlock.className = 'code-block';
    try { argsBlock.textContent = JSON.stringify(log.args, null, 2); }
    catch (e) { argsBlock.textContent = String(log.args); }
    argsSection.appendChild(argsLabel);
    argsSection.appendChild(argsBlock);
    detailBodyScrollEl.appendChild(argsSection);
  }

  function consoleSelectLog(id) {
    consoleSelectedId = id;
    if (consoleLogListEl) {
      var rows = consoleLogListEl.querySelectorAll('.log-row');
      rows.forEach(function(row) {
        row.setAttribute('aria-selected', row.getAttribute('data-id') === String(id) ? 'true' : 'false');
      });
    }
    var log = null;
    for (var i = 0; i < consoleLogs.length; i++) {
      if (consoleLogs[i].id === id) { log = consoleLogs[i]; break; }
    }
    consoleRenderDetail(log);
  }

  function consoleClearLogs() {
    consoleLogs      = [];
    consoleLogsCapped = false;
    consoleSelectedId = null;
    consoleUnread    = 0;
    consoleUpdateBadge();
    consoleRenderList();
    consoleRenderDetail(null);
  }

  function consoleAddLog(msg) {
    var log = {
      id:        ++logIdCounter,
      level:     msg.level === 'warn' || msg.level === 'error' ? msg.level : 'log',
      args:      Array.isArray(msg.args) ? msg.args : [],
      timestamp: typeof msg.timestamp === 'number' ? msg.timestamp : Date.now(),
    };
    consoleLogs.push(log);
    if (consoleLogs.length > LOG_CAP) {
      consoleLogs.shift();
      consoleLogsCapped = true;
    }
    if (activeTab !== 'console') {
      consoleUnread++;
      consoleUpdateBadge();
    }
    consoleRenderList();
  }

  function consoleInitUI() {
    if (consoleUIReady) { return; }
    consoleUIReady = true;

    consoleLogListEl   = document.getElementById('console-log-list');
    consoleSearchEl    = document.getElementById('console-search');
    preserveToggleEl   = document.getElementById('preserve-toggle');
    consoleClearBtnEl  = document.getElementById('console-clear-btn');
    consolePaneEl      = document.getElementById('console-pane');

    if (consoleSearchEl) {
      consoleSearchEl.addEventListener('input', function() {
        consoleSearch = consoleSearchEl.value;
        consoleRenderList();
      });
    }

    if (preserveToggleEl) {
      preserveToggleEl.addEventListener('click', function() {
        preserveLogs = !preserveLogs;
        preserveToggleEl.setAttribute('aria-checked', String(preserveLogs));
      });
    }

    if (consoleClearBtnEl) {
      consoleClearBtnEl.addEventListener('click', function() { consoleClearLogs(); });
    }

    document.querySelectorAll('#console-filter-bar .filter-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        var level = pill.getAttribute('data-level');
        if (consoleFilter === level) { return; }
        consoleFilter = level;
        document.querySelectorAll('#console-filter-bar .filter-pill').forEach(function(p) {
          p.setAttribute('aria-checked', String(p.getAttribute('data-level') === level));
        });
        consoleRenderList();
      });
    });
  }

  // ── Touch tab helpers ─────────────────────────────────────────────────────

  function touchDrawBlob(ctx, x, y, radius, centerAlpha) {
    var grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, 'rgba(186,117,23,' + centerAlpha + ')');
    grad.addColorStop(1, 'rgba(186,117,23,0)');
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function touchScaleCoords(x, y) {
    var vw = (lastDevice && lastDevice.vw) ? lastDevice.vw : 1;
    var vh = (lastDevice && lastDevice.vh) ? lastDevice.vh : 1;
    var cw = touchPermCanvas ? touchPermCanvas.width  : 0;
    var ch = touchPermCanvas ? touchPermCanvas.height : 0;
    return { x: (x / vw) * cw, y: (y / vh) * ch };
  }

  function touchResize() {
    if (!touchWrapEl || !touchPermCanvas || !touchFadeCanvas) { return; }
    if (!lastDevice || !lastDevice.vw || !lastDevice.vh) { return; }
    var wrapW = touchWrapEl.offsetWidth;
    var wrapH = touchWrapEl.offsetHeight;
    if (wrapW === 0 || wrapH === 0) { return; }
    var deviceAspect = lastDevice.vw / lastDevice.vh;
    var wrapAspect   = wrapW / wrapH;
    var canvasW, canvasH;
    if (deviceAspect > wrapAspect) {
      canvasW = wrapW;
      canvasH = Math.round(wrapW / deviceAspect);
    } else {
      canvasH = wrapH;
      canvasW = Math.round(wrapH * deviceAspect);
    }
    var offsetX = Math.floor((wrapW - canvasW) / 2);
    var offsetY = Math.floor((wrapH - canvasH) / 2);
    [touchPermCanvas, touchFadeCanvas].forEach(function(c) {
      c.width        = canvasW;
      c.height       = canvasH;
      c.style.width  = canvasW + 'px';
      c.style.height = canvasH + 'px';
      c.style.left   = offsetX + 'px';
      c.style.top    = offsetY + 'px';
      c.style.visibility = 'visible';
    });
    touchFades = [];
    if (touchRafId) { cancelAnimationFrame(touchRafId); touchRafId = null; }
  }

  function touchRafLoop(now) {
    if (!touchCtxFade || !touchFadeCanvas) { return; }
    touchCtxFade.clearRect(0, 0, touchFadeCanvas.width, touchFadeCanvas.height);
    var next = [];
    for (var i = 0; i < touchFades.length; i++) {
      var fade    = touchFades[i];
      var progress = (now - fade.startTime) / 2000;
      if (progress < 1) {
        touchDrawBlob(touchCtxFade, fade.x, fade.y, 20, 0.8 * (1 - progress));
        next.push(fade);
      }
    }
    touchFades = next;
    if (touchFades.length > 0) {
      touchRafId = requestAnimationFrame(touchRafLoop);
    } else {
      touchRafId = null;
    }
  }

  function touchHandleEvent(msg) {
    if (!touchCtxPerm || !touchPermCanvas) { return; }
    var coords = touchScaleCoords(msg.x, msg.y);
    var cx = coords.x;
    var cy = coords.y;

    if (msg.kind === 'touchstart') {
      touchDrawBlob(touchCtxPerm, cx, cy, 20, 0.8);
      touchCount++;
      if (touchCountEl) { touchCountEl.textContent = 'Touch events: ' + touchCount; }
      if (touchCount === 1 && touchNoDataEl) { touchNoDataEl.setAttribute('hidden', ''); }
    } else if (msg.kind === 'touchmove') {
      touchDrawBlob(touchCtxPerm, cx, cy, 8, 0.4);
    } else if (msg.kind === 'touchend') {
      touchFades.push({ x: cx, y: cy, startTime: typeof msg.timestamp === 'number' ? msg.timestamp : Date.now() });
      if (!touchRafId) { touchRafId = requestAnimationFrame(touchRafLoop); }
    }
  }

  function touchClearHeatmap() {
    if (touchCtxPerm && touchPermCanvas) {
      touchCtxPerm.clearRect(0, 0, touchPermCanvas.width, touchPermCanvas.height);
    }
    if (touchCtxFade && touchFadeCanvas) {
      touchCtxFade.clearRect(0, 0, touchFadeCanvas.width, touchFadeCanvas.height);
    }
    if (touchRafId) { cancelAnimationFrame(touchRafId); touchRafId = null; }
    touchFades = [];
    touchCount = 0;
    if (touchCountEl) { touchCountEl.textContent = 'Touch events: 0'; }
    if (touchNoDataEl) { touchNoDataEl.removeAttribute('hidden'); }
  }

  function touchInitUI() {
    if (touchUIReady) { return; }
    touchUIReady = true;

    touchPermCanvas = document.getElementById('touch-perm-canvas');
    touchFadeCanvas = document.getElementById('touch-fade-canvas');
    touchCountEl    = document.getElementById('touch-count');
    touchNoDataEl   = document.getElementById('touch-no-data');
    touchWrapEl     = document.getElementById('touch-canvas-wrap');
    touchContentEl  = document.getElementById('touch-content');

    if (touchPermCanvas) { touchCtxPerm = touchPermCanvas.getContext('2d'); touchPermCanvas.style.visibility = 'hidden'; }
    if (touchFadeCanvas) { touchCtxFade = touchFadeCanvas.getContext('2d'); touchFadeCanvas.style.visibility = 'hidden'; }

    var clearBtn = document.getElementById('touch-clear-btn');
    if (clearBtn) { clearBtn.addEventListener('click', touchClearHeatmap); }

    window.addEventListener('resize', touchResize);
    touchResize();
  }

  // ── DOM tab helpers ───────────────────────────────────────────────────────

  // Recursively mark nodes at depth 0 and 1 as expanded by default (§8.5).
  // html (0) and head/body (1) are expanded; their children at depth 2 are visible
  // but collapsed, so only three levels are shown before the user interacts.
  function domSetDefaultExpanded(el, depth) {
    if (depth < 2) {
      domExpandedNodes.add(el);
      var child = el.firstElementChild;
      while (child) { domSetDefaultExpanded(child, depth + 1); child = child.nextElementSibling; }
    }
  }

  // Build a simple CSS selector for the selected node so the phone can highlight it.
  function domGenerateSelector(el) {
    if (el.id) { return '#' + el.id; }
    var tag = el.tagName.toLowerCase();
    var classes = el.className && typeof el.className === 'string'
      ? el.className.trim().split(/\s+/).filter(Boolean)
      : [];
    if (classes.length) { return tag + '.' + classes[0]; }
    var n = 1;
    var sib = el.previousElementSibling;
    while (sib) { n++; sib = sib.previousElementSibling; }
    return tag + ':nth-child(' + n + ')';
  }

  // Returns true if el's tag, id, class, or any attribute value matches query.
  function domNodeMatchesSearch(el, query) {
    var q = query.toLowerCase();
    if (el.tagName.toLowerCase().indexOf(q) !== -1) { return true; }
    if (el.id && el.id.toLowerCase().indexOf(q) !== -1) { return true; }
    if (el.className && typeof el.className === 'string' && el.className.toLowerCase().indexOf(q) !== -1) { return true; }
    var attrs = el.attributes;
    for (var i = 0; i < attrs.length; i++) {
      if (attrs[i].name.toLowerCase().indexOf(q) !== -1) { return true; }
      if (attrs[i].value.toLowerCase().indexOf(q) !== -1) { return true; }
    }
    if (el.textContent && el.textContent.toLowerCase().indexOf(q) !== -1) { return true; }
    return false;
  }

  // Recursively adds el to result if el or any descendant matches query.
  // Returns true if any match was found in the subtree.
  function domBuildMatchSet(el, query, result) {
    var selfMatch = domNodeMatchesSearch(el, query);
    var childMatch = false;
    var child = el.firstElementChild;
    while (child) {
      if (domBuildMatchSet(child, query, result)) { childMatch = true; }
      child = child.nextElementSibling;
    }
    if (selfMatch || childMatch) { result.add(el); }
    return selfMatch || childMatch;
  }

  // Build breadcrumb spans for the detail pane ancestor chain.
  function domBuildBreadcrumb(el) {
    if (!domBreadcrumbEl) { return; }
    domBreadcrumbEl.innerHTML = '';
    var chain = [];
    var cur = el;
    while (cur && cur.tagName) { chain.unshift(cur); cur = cur.parentElement; }
    chain.forEach(function (node, i) {
      if (i > 0) {
        var sep = document.createElement('span');
        sep.className = 'dom-breadcrumb-sep';
        sep.textContent = '›'; // ›
        domBreadcrumbEl.appendChild(sep);
      }
      var tag = document.createElement('span');
      tag.className = 'dom-breadcrumb-tag';
      var label = node.tagName.toLowerCase();
      if (node.id) { label += '#' + node.id; }
      else if (node.className && typeof node.className === 'string') {
        var cls = node.className.trim().split(/\s+/)[0];
        if (cls) { label += '.' + cls; }
      }
      tag.textContent = label;
      (function (n) {
        tag.addEventListener('click', function () {
          domSelectedNode = n;
          domRenderTree();
          domPopulateDetail(n);
        });
      }(node));
      domBreadcrumbEl.appendChild(tag);
    });
  }

  // Recursively render one element node and its visible children into container.
  function domRenderSubtree(container, el, depth, matchSet) {
    // When a search is active, skip nodes not in the match set.
    if (matchSet && !matchSet.has(el)) { return; }

    var childEls = [];
    var child = el.firstElementChild;
    while (child) { childEls.push(child); child = child.nextElementSibling; }

    var hasChildren = childEls.length > 0;
    // Auto-expand ancestors when search is active.
    var isExpanded = matchSet ? true : domExpandedNodes.has(el);

    var row = document.createElement('div');
    row.className = 'dom-node';
    row.setAttribute('role', 'treeitem');
    row.setAttribute('aria-selected', el === domSelectedNode ? 'true' : 'false');
    if (hasChildren) { row.setAttribute('aria-expanded', isExpanded ? 'true' : 'false'); }
    row.tabIndex = 0;
    row.style.paddingLeft = (12 + depth * 16) + 'px';

    // Toggle arrow
    var toggle = document.createElement('span');
    toggle.className = 'dom-node-toggle';
    toggle.setAttribute('aria-hidden', 'true');
    toggle.textContent = hasChildren ? (isExpanded ? '▼' : '▶') : '';
    row.appendChild(toggle);

    // Opening tag wrapper
    var openTag = document.createElement('span');
    openTag.className = 'dom-node-open';

    var ang1 = document.createElement('span');
    ang1.className = 'dom-node-angle';
    ang1.textContent = '<';
    openTag.appendChild(ang1);

    var tagSpan = document.createElement('span');
    tagSpan.className = 'dom-node-tag';
    tagSpan.textContent = el.tagName.toLowerCase();
    openTag.appendChild(tagSpan);

    // Show priority attributes: id, class first, then up to 2 others
    var PRIO_ATTRS = ['id', 'class', 'type', 'href', 'src', 'role', 'name', 'for', 'aria-label', 'style'];
    var shownSet = {};
    var shownCount = 0;
    var totalAttrs = el.attributes.length;

    function appendAttr(name, val) {
      if (shownSet[name]) { return; }
      shownSet[name] = true;
      shownCount++;
      var truncVal = val.length > 40 ? val.substring(0, 40) + '…' : val;

      var aName = document.createElement('span');
      aName.className = 'dom-node-attr-name';
      aName.textContent = name;
      var aEq = document.createElement('span');
      aEq.className = 'dom-node-attr-eq';
      aEq.textContent = '="';
      var aVal = document.createElement('span');
      aVal.className = 'dom-node-attr-val';
      aVal.textContent = truncVal + '"';
      openTag.appendChild(aName);
      openTag.appendChild(aEq);
      openTag.appendChild(aVal);
    }

    PRIO_ATTRS.forEach(function (name) {
      if (shownCount >= 4) { return; }
      var v = el.getAttribute(name);
      if (v !== null) { appendAttr(name, v); }
    });
    // Fill remaining slots with any other attrs
    if (shownCount < 4) {
      for (var ai = 0; ai < el.attributes.length && shownCount < 4; ai++) {
        appendAttr(el.attributes[ai].name, el.attributes[ai].value);
      }
    }
    // Overflow indicator
    var shownKeys = Object.keys(shownSet).length;
    if (totalAttrs > shownKeys) {
      var more = document.createElement('span');
      more.className = 'dom-node-more';
      more.textContent = ' …';
      openTag.appendChild(more);
    }

    var ang2 = document.createElement('span');
    ang2.className = 'dom-node-angle';
    ang2.textContent = '>';
    openTag.appendChild(ang2);

    // Text preview for leaf nodes
    if (!hasChildren) {
      var textContent = el.textContent;
      if (textContent) {
        var trimmed = textContent.trim().replace(/\s+/g, ' ');
        if (trimmed) {
          var textPreview = document.createElement('span');
          textPreview.className = 'dom-node-text-preview';
          textPreview.textContent = trimmed.length > 24 ? trimmed.substring(0, 24) + '…' : trimmed;
          openTag.appendChild(textPreview);

          var closingTag = document.createElement('span');
          closingTag.className = 'dom-node-angle';
          closingTag.textContent = '</' + el.tagName.toLowerCase() + '>';
          openTag.appendChild(closingTag);
        }
      }
    }

    row.appendChild(openTag);

    // Click: toggle expand/collapse and select
    row.addEventListener('click', function (e) {
      e.stopPropagation();
      if (hasChildren && !matchSet) {
        if (domExpandedNodes.has(el)) { domExpandedNodes.delete(el); }
        else { domExpandedNodes.add(el); }
      }
      domSelectedNode = el;
      domRenderTree();
      domPopulateDetail(el);
      if (domHighlightBtnEl) { domHighlightBtnEl.removeAttribute('hidden'); }
    });

    container.appendChild(row);

    if (isExpanded) {
      childEls.forEach(function (childEl) { domRenderSubtree(container, childEl, depth + 1, matchSet); });
    }
  }

  // Re-render the full tree in-place, preserving scroll position.
  function domRenderTree() {
    if (!domTreeEl || !domSnapshot) { return; }
    var scrollTop = domTreeEl.scrollTop;
    domTreeEl.innerHTML = '';
    var matchSet = null;
    if (domSearchQuery) {
      matchSet = new Set();
      domBuildMatchSet(domSnapshot.documentElement, domSearchQuery, matchSet);
    }
    domRenderSubtree(domTreeEl, domSnapshot.documentElement, 0, matchSet);
    domTreeEl.scrollTop = scrollTop;
  }

  // Populate the detail pane: breadcrumb, attributes panel, and request live styles.
  function domPopulateDetail(el) {
    if (!domDetailEmptyEl || !domDetailViewEl) { return; }
    domDetailEmptyEl.setAttribute('hidden', '');
    domDetailViewEl.removeAttribute('hidden');

    // Breadcrumb
    domBuildBreadcrumb(el);

    // Attributes panel
    if (domDetailBodyEl) {
      domDetailBodyEl.innerHTML = '';
      var attrs = el.attributes;
      if (attrs && attrs.length > 0) {
        var aSection = document.createElement('div');
        aSection.className = 'dom-section';
        var aLabel = document.createElement('div');
        aLabel.className = 'dom-section-label';
        aLabel.textContent = 'Attributes';
        var aBlock = document.createElement('div');
        aBlock.className = 'dom-attr-block';
        var aTable = document.createElement('table');
        aTable.className = 'dom-attr-table';
        var aTbody = document.createElement('tbody');
        for (var i = 0; i < attrs.length; i++) {
          var tr = document.createElement('tr');
          var tdN = document.createElement('td');
          tdN.textContent = attrs[i].name;
          var tdV = document.createElement('td');
          tdV.textContent = '"' + attrs[i].value + '"';
          tr.appendChild(tdN);
          tr.appendChild(tdV);
          aTbody.appendChild(tr);
        }
        aTable.appendChild(aTbody);
        aBlock.appendChild(aTable);
        aSection.appendChild(aLabel);
        aSection.appendChild(aBlock);
        domDetailBodyEl.appendChild(aSection);
      } else {
        var noAttr = document.createElement('div');
        noAttr.className = 'dom-styles-empty-hint';
        noAttr.textContent = 'No attributes.';
        domDetailBodyEl.appendChild(noAttr);
      }
    }

    // Request live CSS styles from the phone — clear old blocks, show spinner
    if (domStylesContentEl) {
      var toRemove = domStylesContentEl.querySelectorAll('.dom-css-block, .dom-styles-empty-hint');
      for (var tri = 0; tri < toRemove.length; tri++) { toRemove[tri].remove(); }
    }
    if (domStylesLoadingEl) { domStylesLoadingEl.removeAttribute('hidden'); }
    var seq = ++domStylesSeq;
    var selector = domGenerateSelector(el);
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'request_styles', selector: selector, seq: seq }));
    } else {
      // Offline: show snapshot inline styles only
      domHandleStyles({ seq: seq, inline: {}, rules: [], offline: true });
    }
  }

  // Build a single CSS rule block DOM node.
  function domBuildCssBlock(selector, source, properties) {
    var block = document.createElement('div');
    block.className = 'dom-css-block';

    var header = document.createElement('div');
    header.className = 'dom-css-header';
    var selEl = document.createElement('span');
    selEl.className = 'dom-css-selector';
    selEl.textContent = selector;
    header.appendChild(selEl);
    if (source) {
      var srcEl = document.createElement('span');
      srcEl.className = 'dom-css-source';
      srcEl.textContent = source;
      header.appendChild(srcEl);
    }
    block.appendChild(header);

    var openBrace = document.createElement('div');
    openBrace.className = 'dom-css-brace';
    openBrace.textContent = '{';
    block.appendChild(openBrace);

    if (properties && properties.length) {
      properties.forEach(function (prop) {
        var row = document.createElement('div');
        row.className = 'dom-css-prop-row';
        var pName = document.createElement('span');
        pName.className = 'dom-css-prop-name';
        pName.textContent = prop.property;
        var colon = document.createElement('span');
        colon.className = 'dom-css-colon';
        colon.textContent = ':';
        var pVal = document.createElement('span');
        pVal.className = 'dom-css-prop-value';
        pVal.textContent = ' ' + prop.value + ';';
        row.appendChild(pName);
        row.appendChild(colon);
        row.appendChild(pVal);
        if (prop.important) {
          var imp = document.createElement('span');
          imp.className = 'dom-css-important';
          imp.textContent = ' !important';
          row.appendChild(imp);
        }
        block.appendChild(row);
      });
    } else {
      var empty = document.createElement('div');
      empty.className = 'dom-css-prop-row';
      empty.style.color = 'var(--color-text-tertiary)';
      empty.textContent = '  /* empty */';
      block.appendChild(empty);
    }

    var closeBrace = document.createElement('div');
    closeBrace.className = 'dom-css-brace';
    closeBrace.textContent = '}';
    block.appendChild(closeBrace);
    return block;
  }

  // Render styles response into the styles content area.
  function domHandleStyles(data) {
    if (data.seq !== domStylesSeq) { return; } // stale response
    if (!domStylesContentEl) { return; }
    // Hide spinner, remove previous rule blocks
    if (domStylesLoadingEl) { domStylesLoadingEl.setAttribute('hidden', ''); }
    var toRemove = domStylesContentEl.querySelectorAll('.dom-css-block, .dom-styles-empty-hint');
    for (var tri = 0; tri < toRemove.length; tri++) { toRemove[tri].remove(); }

    // element.style block (always shown)
    var inlineProps = Object.keys(data.inline || {}).map(function (p) {
      return { property: p, value: data.inline[p].value, important: data.inline[p].important };
    });
    domStylesContentEl.appendChild(domBuildCssBlock('element.style', '', inlineProps));

    // Matched stylesheet rules
    (data.rules || []).forEach(function (rule) {
      domStylesContentEl.appendChild(domBuildCssBlock(rule.selector, rule.source, rule.properties));
    });

    if (data.offline) {
      var hint = document.createElement('div');
      hint.className = 'dom-styles-empty-hint';
      hint.textContent = 'Live styles unavailable — phone not connected.';
      domStylesContentEl.appendChild(hint);
    }

    // Apply any existing filter
    if (domStylesFilterQuery) { domFilterStyles(); }
  }

  // Filter visible CSS properties by domStylesFilterQuery.
  function domFilterStyles() {
    if (!domStylesContentEl) { return; }
    var q = domStylesFilterQuery.toLowerCase();
    var blocks = domStylesContentEl.querySelectorAll('.dom-css-block');
    for (var bi = 0; bi < blocks.length; bi++) {
      var block = blocks[bi];
      var rows = block.querySelectorAll('.dom-css-prop-row');
      var anyVisible = false;
      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        var pName = row.querySelector('.dom-css-prop-name');
        var pVal  = row.querySelector('.dom-css-prop-value');
        var text  = (pName ? pName.textContent : '') + ':' + (pVal ? pVal.textContent : '');
        var match = !q || text.toLowerCase().indexOf(q) !== -1;
        row.classList.toggle('dom-css-filtered', !match);
        if (match) { anyVisible = true; }
      }
      // Hide entire block if all rows are filtered out (but not the element.style block)
      var selEl = block.querySelector('.dom-css-selector');
      if (selEl && selEl.textContent !== 'element.style') {
        block.hidden = (rows.length > 0 && !anyVisible && !!q);
      }
    }
  }

  // ── Network tab helpers ───────────────────────────────────────────────────

  function networkFormatSize(bytes) {
    if (!bytes) { return '—'; }
    if (bytes < 1024) { return bytes + ' B'; }
    if (bytes < 1024 * 1024) { return (bytes / 1024).toFixed(1) + ' kB'; }
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function networkDetectResourceType(contentType, url) {
    if (!contentType) {
      var p = url.split('?')[0].toLowerCase();
      if (p.slice(-3) === '.js' || p.slice(-4) === '.mjs') { return 'js'; }
      if (p.slice(-4) === '.css') { return 'css'; }
      if (/\.(png|jpg|jpeg|gif|webp|svg|ico)$/.test(p)) { return 'img'; }
      return 'other';
    }
    var ct = contentType.toLowerCase();
    if (ct.indexOf('application/json') !== -1 || ct.indexOf('text/plain') !== -1) { return 'fetch'; }
    if (ct.indexOf('javascript') !== -1) { return 'js'; }
    if (ct.indexOf('css') !== -1) { return 'css'; }
    if (ct.indexOf('image/') !== -1) { return 'img'; }
    if (ct.indexOf('text/html') !== -1) { return 'other'; }
    return 'other';
  }

  function networkPrettifyJson(text) {
    try { return JSON.stringify(JSON.parse(text), null, 2); } catch (e) { return text; }
  }

  function networkGetPathFromUrl(url) {
    try { var u = new URL(url); return u.pathname + u.search; } catch (e) { return url; }
  }

  function networkGetFilteredRequests() {
    return networkRequests.filter(function(req) {
      if (networkFilter === 'errors') {
        if (req.state !== 'error' && !(req.status >= 400)) { return false; }
      } else if (networkFilter !== 'all') {
        if (req.resourceType !== networkFilter) { return false; }
      }
      if (networkSearch && req.url.toLowerCase().indexOf(networkSearch.toLowerCase()) === -1) { return false; }
      return true;
    });
  }

  function networkUpdateBadge() {
    var badge = document.getElementById('network-badge');
    if (!badge) { return; }
    var tabEl = document.getElementById('tab-network');
    if (networkUnread === 0) {
      badge.classList.remove('visible');
      badge.textContent = '';
      if (tabEl) { tabEl.setAttribute('aria-label', 'Network'); }
    } else {
      var label = networkUnread > 99 ? '99+' : String(networkUnread);
      badge.textContent = label;
      badge.classList.add('visible');
      if (tabEl) {
        tabEl.setAttribute('aria-label', 'Network, ' + networkUnread +
          ' new request' + (networkUnread === 1 ? '' : 's'));
      }
    }
  }

  function networkHighlightText(text, query) {
    if (!query) { return document.createTextNode(text); }
    var frag = document.createDocumentFragment();
    var lower = text.toLowerCase();
    var lowerQ = query.toLowerCase();
    var last = 0;
    var idx;
    while ((idx = lower.indexOf(lowerQ, last)) !== -1) {
      if (idx > last) { frag.appendChild(document.createTextNode(text.slice(last, idx))); }
      var mark = document.createElement('mark');
      mark.style.cssText = 'background:#FAEEDA;color:#633806;border-radius:2px';
      mark.textContent = text.slice(idx, idx + query.length);
      frag.appendChild(mark);
      last = idx + query.length;
    }
    if (last < text.length) { frag.appendChild(document.createTextNode(text.slice(last))); }
    return frag;
  }

  function networkMakeRowEl(req) {
    var row = document.createElement('div');
    row.className = 'net-row';
    row.setAttribute('role', 'listitem');
    row.setAttribute('tabindex', '0');
    row.setAttribute('data-id', req.requestId);
    row.setAttribute('aria-selected', networkSelectedId === req.requestId ? 'true' : 'false');

    var dot = document.createElement('span');
    dot.className = 'net-dot';
    dot.setAttribute('aria-hidden', 'true');
    dot.style.background = req.state === 'error' ? '#E24B4A' : req.state === 'pending' ? '#BA7517' : '#639922';
    row.appendChild(dot);

    var badge = document.createElement('span');
    badge.className = 'net-method net-method--' + req.method.toLowerCase();
    badge.textContent = req.method;
    row.appendChild(badge);

    var urlCol = document.createElement('div');
    urlCol.className = 'net-url-col';
    var urlEl = document.createElement('span');
    urlEl.className = 'net-url';
    urlEl.textContent = networkGetPathFromUrl(req.url);
    urlCol.appendChild(urlEl);
    row.appendChild(urlCol);

    var meta = document.createElement('div');
    meta.className = 'net-meta';
    var dur = document.createElement('div');
    dur.className = 'net-duration';
    dur.textContent = req.duration !== null ? req.duration + 'ms' : '—';
    var sz = document.createElement('div');
    sz.className = 'net-size';
    if (req.state === 'pending') {
      sz.textContent = 'pending';
      sz.style.color = '#BA7517';
    } else {
      sz.textContent = req.size ? networkFormatSize(req.size) : '—';
    }
    meta.appendChild(dur);
    meta.appendChild(sz);
    row.appendChild(meta);

    row.addEventListener('click', function() { networkSelectRequest(req.requestId); });
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); networkSelectRequest(req.requestId); }
      if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && networkListEl) {
        e.preventDefault();
        var rows = Array.prototype.slice.call(networkListEl.querySelectorAll('.net-row'));
        var idx  = rows.indexOf(row);
        var next = e.key === 'ArrowDown' ? rows[idx + 1] : rows[idx - 1];
        if (next) { next.focus(); }
      }
    });
    return row;
  }

  function networkRenderList() {
    if (!networkListEl) { return; }
    networkListEl.innerHTML = '';
    if (networkCapped) {
      var notice = document.createElement('div');
      notice.className = 'net-cap-notice';
      notice.textContent = 'Oldest requests have been removed (limit: 1000)';
      networkListEl.appendChild(notice);
    }
    if (networkRequests.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'net-list-empty';
      empty.innerHTML = '<i class="ti ti-network" aria-hidden="true"></i>' +
        '<div class="net-list-empty-heading">No requests yet</div>' +
        '<div class="net-list-empty-body">Network activity from the phone will appear here</div>';
      networkListEl.appendChild(empty);
      return;
    }
    var filtered = networkGetFilteredRequests();
    if (filtered.length === 0) {
      var empty2 = document.createElement('div');
      empty2.className = 'net-list-empty';
      empty2.innerHTML = '<i class="ti ti-filter-off" aria-hidden="true"></i>' +
        '<div class="net-list-empty-heading">No matching requests</div>' +
        '<div class="net-list-empty-body">Try a different filter or clear your search</div>';
      networkListEl.appendChild(empty2);
      return;
    }
    var frag = document.createDocumentFragment();
    filtered.forEach(function(req) { frag.appendChild(networkMakeRowEl(req)); });
    networkListEl.appendChild(frag);
  }

  function networkRenderHeadersTable(headers, sectionLabel) {
    var wrap = document.createDocumentFragment();
    var lbl = document.createElement('div');
    lbl.className = 'net-section-label';
    lbl.textContent = sectionLabel;
    wrap.appendChild(lbl);
    var keys = Object.keys(headers || {});
    if (!keys.length) {
      var hint = document.createElement('div');
      hint.className = 'net-empty-hint';
      hint.textContent = 'No headers';
      wrap.appendChild(hint);
      return { frag: wrap, visible: 0, total: 0 };
    }
    var table = document.createElement('table');
    table.className = 'net-header-table';
    var tbody = document.createElement('tbody');
    var q = networkDetailSearch.toLowerCase();
    var visible = 0;
    keys.forEach(function(key) {
      var val = String(headers[key] || '');
      var matches = !q || key.toLowerCase().indexOf(q) !== -1 || val.toLowerCase().indexOf(q) !== -1;
      var tr = document.createElement('tr');
      if (!matches) { tr.style.display = 'none'; } else { visible++; }
      var tdK = document.createElement('td');
      tdK.className = 'net-header-key';
      tdK.appendChild(q ? networkHighlightText(key, networkDetailSearch) : document.createTextNode(key));
      var tdV = document.createElement('td');
      tdV.className = 'net-header-val';
      tdV.appendChild(q ? networkHighlightText(val, networkDetailSearch) : document.createTextNode(val));
      tr.appendChild(tdK);
      tr.appendChild(tdV);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return { frag: wrap, visible: visible, total: keys.length };
  }

  function networkRenderCodeBlock(text, prettify) {
    var displayText = prettify ? networkPrettifyJson(text) : text;
    var lines = displayText.split('\n');
    var container = document.createElement('div');
    container.className = 'net-code-block';
    var q = networkDetailSearch;
    if (!q) { container.textContent = displayText; return { el: container, visible: lines.length, total: lines.length }; }
    var lowerQ = q.toLowerCase();
    var visible = 0;
    var frag = document.createDocumentFragment();
    lines.forEach(function(line, i) {
      var matches = line.toLowerCase().indexOf(lowerQ) !== -1;
      if (!matches) {
        var hidden = document.createElement('span');
        hidden.style.display = 'none';
        hidden.textContent = line + (i < lines.length - 1 ? '\n' : '');
        frag.appendChild(hidden);
      } else {
        visible++;
        var span = document.createElement('span');
        span.appendChild(networkHighlightText(line, q));
        if (i < lines.length - 1) { span.appendChild(document.createTextNode('\n')); }
        frag.appendChild(span);
      }
    });
    container.appendChild(frag);
    return { el: container, visible: visible, total: lines.length };
  }

  function networkUpdateDetailSearchUI(visible, total, placeholder) {
    if (!netDsearchInputEl) { return; }
    if (placeholder !== undefined) { netDsearchInputEl.placeholder = placeholder; }
    var hasVal = netDsearchInputEl.value.length > 0;
    if (netDsearchClearEl) { netDsearchClearEl.hidden = !hasVal; }
    if (netDsearchCountEl) {
      if (hasVal && typeof visible === 'number') {
        netDsearchCountEl.textContent = visible + ' of ' + total + ' result' + (total === 1 ? '' : 's');
        netDsearchCountEl.hidden = false;
      } else {
        netDsearchCountEl.hidden = true;
      }
    }
  }

  function networkRenderDetailContent(req) {
    if (!netDetailContentEl) { return; }
    netDetailContentEl.innerHTML = '';
    if (!req) { return; }
    var subTab = networkDetailSubTab;

    if (subTab === 'request-headers') {
      var rh = networkRenderHeadersTable(req.requestHeaders || {}, 'REQUEST HEADERS');
      netDetailContentEl.appendChild(rh.frag);
      networkUpdateDetailSearchUI(rh.visible, rh.total, 'Search headers…');
      return;
    }
    if (subTab === 'response-headers') {
      var resh = networkRenderHeadersTable(req.responseHeaders || {}, 'RESPONSE HEADERS');
      netDetailContentEl.appendChild(resh.frag);
      networkUpdateDetailSearchUI(resh.visible, resh.total, 'Search headers…');
      return;
    }
    if (subTab === 'payload') {
      var secLbl = document.createElement('div');
      secLbl.className = 'net-section-label';
      secLbl.textContent = 'REQUEST BODY';
      netDetailContentEl.appendChild(secLbl);
      if (!req.requestBody) {
        var noBody = document.createElement('div');
        noBody.className = 'net-empty-hint';
        noBody.textContent = 'No request body';
        netDetailContentEl.appendChild(noBody);
        networkUpdateDetailSearchUI(0, 0, 'Search payload…');
        return;
      }
      if (req.requestBody.type === 'formdata') {
        var fdResult = networkRenderHeadersTable(req.requestBody.content || {}, '');
        netDetailContentEl.appendChild(fdResult.frag);
        networkUpdateDetailSearchUI(fdResult.visible, fdResult.total, 'Search payload…');
      } else if (req.requestBody.type === 'binary') {
        var binHint = document.createElement('div');
        binHint.className = 'net-empty-hint';
        binHint.textContent = '[Binary data — not displayable]';
        netDetailContentEl.appendChild(binHint);
        networkUpdateDetailSearchUI(0, 0, 'Search payload…');
      } else {
        var plCode = networkRenderCodeBlock(req.requestBody.content || '', true);
        netDetailContentEl.appendChild(plCode.el);
        networkUpdateDetailSearchUI(plCode.visible, plCode.total, 'Search payload…');
      }
      return;
    }
    if (subTab === 'response') {
      var ct = (req.contentType || '').toLowerCase();
      if (req.bodyTruncated) {
        var truncNotice = document.createElement('div');
        truncNotice.className = 'net-truncated-notice';
        truncNotice.textContent = '! Response truncated at 100KB. Full body not captured.';
        netDetailContentEl.appendChild(truncNotice);
      }
      if (ct.indexOf('image/') !== -1) {
        var imgHint = document.createElement('div');
        imgHint.className = 'net-empty-hint';
        imgHint.textContent = 'Image response — see Preview tab';
        netDetailContentEl.appendChild(imgHint);
        networkUpdateDetailSearchUI(0, 0, 'Search response…');
        return;
      }
      var isJson = ct.indexOf('application/json') !== -1 || ct.indexOf('text/json') !== -1;
      var resCode = networkRenderCodeBlock(req.body || '', isJson);
      netDetailContentEl.appendChild(resCode.el);
      networkUpdateDetailSearchUI(resCode.visible, resCode.total, 'Search response…');
      return;
    }
    if (subTab === 'preview') {
      var pct = (req.contentType || '').toLowerCase();
      if (pct.indexOf('image/') !== -1) {
        var imgEl = document.createElement('img');
        imgEl.src = req.url;
        imgEl.alt = '';
        imgEl.style.cssText = 'max-width:100%;border-radius:6px;display:block;';
        netDetailContentEl.appendChild(imgEl);
        networkUpdateDetailSearchUI(null, null, '');
        return;
      }
      if (pct.indexOf('text/html') !== -1) {
        var iframe = document.createElement('iframe');
        iframe.setAttribute('srcdoc', req.body || '');
        iframe.setAttribute('sandbox', 'allow-same-origin');
        iframe.style.cssText = 'width:100%;min-height:200px;border:none;border-radius:6px;';
        netDetailContentEl.appendChild(iframe);
        networkUpdateDetailSearchUI(null, null, '');
        return;
      }
      var isJson2 = pct.indexOf('application/json') !== -1 || pct.indexOf('text/json') !== -1;
      var prevCode = networkRenderCodeBlock(req.body || '', isJson2);
      netDetailContentEl.appendChild(prevCode.el);
      networkUpdateDetailSearchUI(prevCode.visible, prevCode.total, 'Search preview…');
      return;
    }
    if (subTab === 'timing') {
      networkUpdateDetailSearchUI(null, null, '');
      if (!req.timing) {
        var timEmpty = document.createElement('div');
        timEmpty.className = 'net-timing-empty';
        timEmpty.innerHTML = '<i class="ti ti-clock" aria-hidden="true"></i>' +
          '<div class="net-empty-hint-heading">Timing data not available</div>' +
          '<div class="net-empty-hint-body">PerformanceResourceTiming API returned no data for this request</div>';
        netDetailContentEl.appendChild(timEmpty);
        return;
      }
      var timing = req.timing;
      var total = timing.total || 1;
      var phases = [
        { label: 'DNS LOOKUP',     value: timing.dns,      color: '#378ADD' },
        { label: 'CONNECTING',     value: timing.connect,  color: '#1D9E75' },
        { label: 'SSL / TLS',      value: timing.ssl,      color: '#5DCAA5' },
        { label: 'WAITING (TTFB)', value: timing.ttfb,     color: '#BA7517' },
        { label: 'RECEIVING',      value: timing.download, color: '#639922' },
      ];
      var phasesDiv = document.createElement('div');
      phasesDiv.className = 'net-timing-phases';
      phases.forEach(function(ph) {
        var row = document.createElement('div');
        row.className = 'net-timing-row';
        var lbl = document.createElement('div');
        lbl.className = 'net-timing-label';
        lbl.textContent = ph.label;
        var track = document.createElement('div');
        track.className = 'net-timing-track';
        var fill = document.createElement('div');
        fill.className = 'net-timing-fill';
        fill.style.background = ph.color;
        fill.style.width = (Math.max(0, ph.value || 0) / total * 100).toFixed(1) + '%';
        track.appendChild(fill);
        var val = document.createElement('div');
        val.className = 'net-timing-value';
        val.textContent = (ph.value || 0) + 'ms';
        row.appendChild(lbl);
        row.appendChild(track);
        row.appendChild(val);
        phasesDiv.appendChild(row);
      });
      netDetailContentEl.appendChild(phasesDiv);
      var totDiv = document.createElement('div');
      totDiv.className = 'net-timing-total';
      var totLbl = document.createElement('div');
      totLbl.className = 'net-section-label';
      totLbl.textContent = 'TOTAL';
      var totVal = document.createElement('div');
      totVal.className = 'net-timing-total-val';
      var totNum = document.createElement('span');
      totNum.className = 'net-timing-total-num';
      totNum.textContent = timing.total;
      var totUnit = document.createElement('span');
      totUnit.className = 'net-timing-total-unit';
      totUnit.textContent = 'ms';
      totVal.appendChild(totNum);
      totVal.appendChild(totUnit);
      totDiv.appendChild(totLbl);
      totDiv.appendChild(totVal);
      netDetailContentEl.appendChild(totDiv);
      return;
    }
  }

  function networkRenderDetail(req) {
    if (!netDetailEmptyEl) { netDetailEmptyEl  = document.getElementById('empty-network-detail'); }
    if (!netDetailViewEl)  { netDetailViewEl   = document.getElementById('network-detail-view'); }
    if (!netDetailUrlEl)   { netDetailUrlEl    = document.getElementById('network-detail-url'); }
    if (!netDetailMetaEl)  { netDetailMetaEl   = document.getElementById('network-detail-meta'); }
    if (!netDetailContentEl) { netDetailContentEl = document.getElementById('network-detail-content'); }
    if (!netDetailSearchEl)  { netDetailSearchEl  = document.getElementById('network-detail-search'); }
    if (!netDsearchInputEl)  { netDsearchInputEl  = document.getElementById('network-dsearch-input'); }
    if (!netDsearchCountEl)  { netDsearchCountEl  = document.getElementById('network-dsearch-count'); }
    if (!netDsearchClearEl)  { netDsearchClearEl  = document.getElementById('network-dsearch-clear'); }

    if (!req) {
      if (netDetailEmptyEl) { netDetailEmptyEl.removeAttribute('hidden'); }
      if (netDetailViewEl)  { netDetailViewEl.setAttribute('hidden', ''); }
      return;
    }
    if (netDetailEmptyEl) { netDetailEmptyEl.setAttribute('hidden', ''); }
    if (!netDetailViewEl) { return; }
    netDetailViewEl.removeAttribute('hidden');

    if (netDetailUrlEl) { netDetailUrlEl.textContent = req.method + ' ' + req.url; }

    if (netDetailMetaEl) {
      netDetailMetaEl.innerHTML = '';
      var sc = document.createElement('span');
      sc.className = 'net-meta-chip';
      if (req.state === 'pending') {
        sc.classList.add('net-meta-chip--pending');
        sc.innerHTML = '<i class="ti ti-clock" aria-hidden="true"></i>— Pending';
      } else if (req.state === 'error') {
        sc.classList.add('net-meta-chip--error');
        sc.innerHTML = '<i class="ti ti-x" aria-hidden="true"></i>' + (req.status || 'Error') + (req.statusText ? ' ' + req.statusText : '');
      } else {
        sc.classList.add('net-meta-chip--ok');
        sc.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>' + req.status + ' ' + req.statusText;
      }
      netDetailMetaEl.appendChild(sc);

      var dc = document.createElement('span');
      dc.className = 'net-meta-chip';
      dc.innerHTML = '<i class="ti ti-clock" aria-hidden="true"></i>' + (req.duration !== null ? req.duration + 'ms' : '—');
      netDetailMetaEl.appendChild(dc);

      var szc = document.createElement('span');
      szc.className = 'net-meta-chip';
      szc.innerHTML = '<i class="ti ti-database" aria-hidden="true"></i>' + (req.size ? networkFormatSize(req.size) : '—');
      netDetailMetaEl.appendChild(szc);

      if (req.contentType) {
        var ctc = document.createElement('span');
        ctc.className = 'net-meta-chip';
        ctc.innerHTML = '<i class="ti ti-code" aria-hidden="true"></i>' + req.contentType.split(';')[0].split('/').pop();
        netDetailMetaEl.appendChild(ctc);
      }
    }

    // Payload tab: hide for requests without a body
    var payloadBtn = document.getElementById('net-subtab-payload');
    if (payloadBtn) {
      payloadBtn.style.display = req.requestBody ? '' : 'none';
      if (networkDetailSubTab === 'payload' && !req.requestBody) { networkDetailSubTab = 'request-headers'; }
    }

    // Sync active sub-tab visuals
    var subTabMap = {
      'request-headers': 'net-subtab-req-headers',
      'response-headers': 'net-subtab-res-headers',
      'payload': 'net-subtab-payload',
      'response': 'net-subtab-response',
      'preview': 'net-subtab-preview',
      'timing': 'net-subtab-timing',
    };
    Object.keys(subTabMap).forEach(function(k) {
      var btn = document.getElementById(subTabMap[k]);
      if (!btn) { return; }
      var isActive = k === networkDetailSubTab;
      btn.classList.toggle('net-subtab-active', isActive);
      btn.setAttribute('aria-selected', String(isActive));
    });

    // Hide search bar on timing, image preview, html preview
    var hideSearch = networkDetailSubTab === 'timing';
    if (!hideSearch && networkDetailSubTab === 'preview') {
      var pct2 = (req.contentType || '').toLowerCase();
      if (pct2.indexOf('image/') !== -1 || pct2.indexOf('text/html') !== -1) { hideSearch = true; }
    }
    if (netDetailSearchEl) { netDetailSearchEl.hidden = hideSearch; }

    networkRenderDetailContent(req);
  }

  function networkSelectRequest(id) {
    networkSelectedId   = id;
    networkDetailSearch = '';
    if (netDsearchInputEl) { netDsearchInputEl.value = ''; }
    if (networkListEl) {
      var rows = networkListEl.querySelectorAll('.net-row');
      rows.forEach(function(row) {
        row.setAttribute('aria-selected', row.getAttribute('data-id') === id ? 'true' : 'false');
      });
    }
    var req = null;
    for (var i = 0; i < networkRequests.length; i++) {
      if (networkRequests[i].requestId === id) { req = networkRequests[i]; break; }
    }
    networkRenderDetail(req);
  }

  function networkClearRequests() {
    networkRequests   = [];
    networkCapped     = false;
    networkSelectedId = null;
    networkUnread     = 0;
    networkUpdateBadge();
    networkRenderList();
    networkRenderDetail(null);
  }

  function networkAddRequest(msg) {
    networkRequests.push({
      requestId: msg.requestId, method: msg.method || 'GET', url: msg.url || '',
      status: null, statusText: '', resourceType: msg.initiator || 'fetch',
      requestHeaders: msg.requestHeaders || {}, requestBody: msg.requestBody || null,
      responseHeaders: {}, body: '', bodyTruncated: false, contentType: '',
      size: 0, duration: null, timing: null, error: null,
      startedAt: Date.now(), state: 'pending',
    });
    if (networkRequests.length > NETWORK_CAP) { networkRequests.shift(); networkCapped = true; }
    if (activeTab !== 'network') { networkUnread++; networkUpdateBadge(); }
    networkRenderList();
  }

  function networkUpdateRequest(msg) {
    var req = null;
    for (var i = 0; i < networkRequests.length; i++) {
      if (networkRequests[i].requestId === msg.requestId) { req = networkRequests[i]; break; }
    }
    if (!req) { return; }
    req.status          = msg.status;
    req.statusText      = msg.statusText || '';
    req.responseHeaders = msg.responseHeaders || {};
    req.body            = msg.body || '';
    req.bodyTruncated   = !!msg.bodyTruncated;
    req.contentType     = msg.contentType || '';
    req.resourceType    = networkDetectResourceType(msg.contentType, req.url);
    req.size            = msg.size || 0;
    req.duration        = msg.duration;
    req.timing          = msg.timing || null;
    req.state           = (typeof msg.status === 'number' && msg.status >= 400) ? 'error' : 'done';
    networkRenderList();
    if (req.requestId === networkSelectedId) { networkRenderDetail(req); }
  }

  function networkErrorRequest(msg) {
    var req = null;
    for (var i = 0; i < networkRequests.length; i++) {
      if (networkRequests[i].requestId === msg.requestId) { req = networkRequests[i]; break; }
    }
    if (!req) { return; }
    req.error = msg.error; req.duration = msg.duration; req.state = 'error';
    networkRenderList();
    if (req.requestId === networkSelectedId) { networkRenderDetail(req); }
  }

  function networkInitUI() {
    if (networkUIReady) { return; }
    networkUIReady = true;

    networkPaneEl     = document.getElementById('network-pane');
    networkListEl     = document.getElementById('network-list');
    networkSearchEl   = document.getElementById('network-search');
    networkPreserveEl = document.getElementById('network-preserve-toggle');
    networkClearBtnEl = document.getElementById('network-clear-btn');
    netDetailEmptyEl  = document.getElementById('empty-network-detail');
    netDetailViewEl   = document.getElementById('network-detail-view');
    netDetailUrlEl    = document.getElementById('network-detail-url');
    netDetailMetaEl   = document.getElementById('network-detail-meta');
    netDetailContentEl = document.getElementById('network-detail-content');
    netDetailSearchEl  = document.getElementById('network-detail-search');
    netDsearchInputEl  = document.getElementById('network-dsearch-input');
    netDsearchCountEl  = document.getElementById('network-dsearch-count');
    netDsearchClearEl  = document.getElementById('network-dsearch-clear');

    if (networkSearchEl) {
      networkSearchEl.addEventListener('input', function() {
        networkSearch = networkSearchEl.value;
        networkRenderList();
      });
    }
    if (networkPreserveEl) {
      networkPreserveEl.addEventListener('click', function() {
        networkPreserve = !networkPreserve;
        networkPreserveEl.setAttribute('aria-checked', String(networkPreserve));
      });
    }
    if (networkClearBtnEl) {
      networkClearBtnEl.addEventListener('click', function() { networkClearRequests(); });
    }

    // Filter pills
    document.querySelectorAll('#network-filter-bar .net-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        var type = pill.getAttribute('data-type');
        if (networkFilter === type) { return; }
        networkFilter = type;
        document.querySelectorAll('#network-filter-bar .net-pill').forEach(function(p) {
          p.setAttribute('aria-checked', String(p.getAttribute('data-type') === type));
        });
        networkRenderList();
      });
      pill.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
          e.preventDefault();
          var pills = Array.prototype.slice.call(document.querySelectorAll('#network-filter-bar .net-pill'));
          var idx   = pills.indexOf(pill);
          var next  = e.key === 'ArrowRight' ? pills[(idx + 1) % pills.length] : pills[(idx - 1 + pills.length) % pills.length];
          if (next) { next.click(); next.focus(); }
        }
      });
    });

    // Sub-tab buttons
    var subTabMap = [
      { id: 'net-subtab-req-headers',  key: 'request-headers' },
      { id: 'net-subtab-res-headers',  key: 'response-headers' },
      { id: 'net-subtab-payload',      key: 'payload' },
      { id: 'net-subtab-response',     key: 'response' },
      { id: 'net-subtab-preview',      key: 'preview' },
      { id: 'net-subtab-timing',       key: 'timing' },
    ];
    subTabMap.forEach(function(entry) {
      var btn = document.getElementById(entry.id);
      if (!btn) { return; }
      btn.addEventListener('click', function() {
        networkDetailSubTab = entry.key;
        networkDetailSearch = '';
        if (netDsearchInputEl) { netDsearchInputEl.value = ''; }
        if (netDsearchClearEl) { netDsearchClearEl.hidden = true; }
        if (netDsearchCountEl) { netDsearchCountEl.hidden = true; }
        var req = null;
        for (var ri = 0; ri < networkRequests.length; ri++) {
          if (networkRequests[ri].requestId === networkSelectedId) { req = networkRequests[ri]; break; }
        }
        if (req) { networkRenderDetail(req); }
      });
    });

    // Detail search input
    if (netDsearchInputEl) {
      netDsearchInputEl.addEventListener('input', function() {
        networkDetailSearch = netDsearchInputEl.value;
        if (netDsearchClearEl) { netDsearchClearEl.hidden = !networkDetailSearch; }
        var req = null;
        for (var ri = 0; ri < networkRequests.length; ri++) {
          if (networkRequests[ri].requestId === networkSelectedId) { req = networkRequests[ri]; break; }
        }
        if (req) { networkRenderDetailContent(req); }
      });
    }
    if (netDsearchClearEl) {
      netDsearchClearEl.addEventListener('click', function() {
        networkDetailSearch = '';
        if (netDsearchInputEl) { netDsearchInputEl.value = ''; }
        netDsearchClearEl.hidden = true;
        if (netDsearchCountEl) { netDsearchCountEl.hidden = true; }
        var req = null;
        for (var ri = 0; ri < networkRequests.length; ri++) {
          if (networkRequests[ri].requestId === networkSelectedId) { req = networkRequests[ri]; break; }
        }
        if (req) { networkRenderDetailContent(req); }
      });
    }

    // Sidebar resize — mousedown on handle, move/up on document
    networkSidebarEl = document.getElementById('network-sidebar');
    netResizerEl     = document.getElementById('net-resizer');
