    if (netResizerEl && networkSidebarEl) {
      netResizerEl.addEventListener('mousedown', function(e) {
        netResizerDragging = true;
        netResizerStartX   = e.clientX;
        netResizerStartW   = networkSidebarEl.offsetWidth;
        netResizerEl.classList.add('net-resizer-dragging');
        document.body.style.cursor     = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
    }
    document.addEventListener('mousemove', function(e) {
      if (!netResizerDragging || !networkSidebarEl) { return; }
      var dx   = e.clientX - netResizerStartX;
      var newW = Math.max(160, Math.min(520, netResizerStartW + dx));
      networkSidebarEl.style.width = newW + 'px';
    });
    document.addEventListener('mouseup', function() {
      if (!netResizerDragging) { return; }
      netResizerDragging = false;
      if (netResizerEl) { netResizerEl.classList.remove('net-resizer-dragging'); }
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
    });
  }

  // Show loading state and arm the 10-second timeout.
  function domShowLoading() {
    if (domSidebarEmptyEl) { domSidebarEmptyEl.setAttribute('hidden', ''); }
    if (domSearchBarEl)    { domSearchBarEl.setAttribute('hidden', ''); }
    if (domTreeEl) { domTreeEl.setAttribute('hidden', ''); }
    if (domLoadingEl) { domLoadingEl.removeAttribute('hidden'); }
    if (domLoadingTimer !== null) { clearTimeout(domLoadingTimer); }
    domLoadingTimer = setTimeout(function () {
      domLoadingTimer = null;
      // Timeout — revert sidebar to a visible error state
      if (domLoadingEl) { domLoadingEl.setAttribute('hidden', ''); }
      if (domSidebarEmptyEl) {
        domSidebarEmptyEl.querySelector('i').className = 'ti ti-alert-triangle';
        domSidebarEmptyEl.querySelector('.empty-heading').textContent = 'Snapshot timed out';
        domSidebarEmptyEl.querySelector('.empty-body').textContent = 'The phone did not respond. Try again.';
        domSidebarEmptyEl.removeAttribute('hidden');
      }
    }, 10000);
  }

  // Handle a dom snapshot message from the phone.
  function domHandleSnapshot(html) {
    if (domLoadingTimer !== null) { clearTimeout(domLoadingTimer); domLoadingTimer = null; }
    var parser = new DOMParser();
    domSnapshot = parser.parseFromString(html, 'text/html');
    domExpandedNodes = new WeakSet();
    if (domSnapshot.documentElement) { domSetDefaultExpanded(domSnapshot.documentElement, 0); }
    domSelectedNode = null;
    if (domHighlightBtnEl) { domHighlightBtnEl.setAttribute('hidden', ''); }
    if (domDetailEmptyEl) { domDetailEmptyEl.removeAttribute('hidden'); }
    if (domDetailViewEl) { domDetailViewEl.setAttribute('hidden', ''); }
    if (domLoadingEl) { domLoadingEl.setAttribute('hidden', ''); }
    if (domSidebarEmptyEl) { domSidebarEmptyEl.setAttribute('hidden', ''); }
    if (domSearchBarEl) { domSearchBarEl.removeAttribute('hidden'); }
    if (domTreeEl) { domTreeEl.removeAttribute('hidden'); }
    domRenderTree();
  }

  // Initialize DOM tab UI refs and event handlers (called once on first connect).
  function domInitUI() {
    if (domUIReady) { return; }
    domUIReady = true;
    domContentEl       = document.getElementById('dom-content');
    domSidebarEmptyEl  = document.getElementById('dom-sidebar-empty');
    domLoadingEl       = document.getElementById('dom-loading');
    domTreeEl          = document.getElementById('dom-tree');
    domSearchBarEl     = document.getElementById('dom-search-bar');
    domSearchInputEl   = document.getElementById('dom-search-input');
    domDetailEmptyEl   = document.getElementById('dom-detail-empty');
    domDetailViewEl    = document.getElementById('dom-detail-view');
    domBreadcrumbEl    = document.getElementById('dom-breadcrumb');
    domDtabStylesEl    = document.getElementById('dom-dtab-styles');
    domDtabAttrsEl     = document.getElementById('dom-dtab-attrs');
    domStylesPanelEl   = document.getElementById('dom-styles-panel');
    domStylesContentEl = document.getElementById('dom-styles-content');
    domStylesFilterEl  = document.getElementById('dom-styles-filter');
    domStylesLoadingEl = document.getElementById('dom-styles-loading');
    domAttrsPanelEl    = document.getElementById('dom-attrs-panel');
    domDetailBodyEl    = document.getElementById('dom-detail-body');
    domSnapshotBtnEl   = document.getElementById('dom-snapshot-btn');
    domHighlightBtnEl  = document.getElementById('dom-highlight-btn');
    domSidebarEl       = document.getElementById('dom-sidebar');
    domResizerEl       = document.getElementById('dom-resizer');

    // Sidebar resize — mousedown on handle, move/up on document
    if (domResizerEl && domSidebarEl) {
      domResizerEl.addEventListener('mousedown', function (e) {
        domResizerDragging = true;
        domResizerStartX   = e.clientX;
        domResizerStartW   = domSidebarEl.offsetWidth;
        domResizerEl.classList.add('dom-resizer-dragging');
        document.body.style.cursor    = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
    }
    document.addEventListener('mousemove', function (e) {
      if (!domResizerDragging || !domSidebarEl) { return; }
      var dx   = e.clientX - domResizerStartX;
      var newW = Math.max(160, Math.min(520, domResizerStartW + dx));
      domSidebarEl.style.width = newW + 'px';
    });
    document.addEventListener('mouseup', function () {
      if (!domResizerDragging) { return; }
      domResizerDragging = false;
      if (domResizerEl) { domResizerEl.classList.remove('dom-resizer-dragging'); }
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
    });

    if (domSnapshotBtnEl) {
      domSnapshotBtnEl.addEventListener('click', function () {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'request_dom' }));
          domShowLoading();
        }
      });
    }
    if (domHighlightBtnEl) {
      domHighlightBtnEl.addEventListener('click', function () {
        if (!domSelectedNode || !ws || ws.readyState !== WebSocket.OPEN) { return; }
        ws.send(JSON.stringify({ type: 'highlight', selector: domGenerateSelector(domSelectedNode) }));
      });
    }

    // Search input — re-render tree as user types
    if (domSearchInputEl) {
      domSearchInputEl.addEventListener('input', function () {
        domSearchQuery = domSearchInputEl.value.trim();
        domRenderTree();
      });
      domSearchInputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { domSearchInputEl.value = ''; domSearchQuery = ''; domRenderTree(); }
      });
    }

    // Detail sub-tabs
    function switchDetailTab(tab) {
      domActiveDetailTab = tab;
      var isStyles = tab === 'styles';
      if (domDtabStylesEl) {
        domDtabStylesEl.classList.toggle('dom-dtab-active', isStyles);
        domDtabStylesEl.setAttribute('aria-selected', String(isStyles));
      }
      if (domDtabAttrsEl) {
        domDtabAttrsEl.classList.toggle('dom-dtab-active', !isStyles);
        domDtabAttrsEl.setAttribute('aria-selected', String(!isStyles));
      }
      if (domStylesPanelEl) { domStylesPanelEl.hidden = !isStyles; }
      if (domAttrsPanelEl)  { domAttrsPanelEl.hidden  = isStyles;  }
    }
    if (domDtabStylesEl) { domDtabStylesEl.addEventListener('click', function () { switchDetailTab('styles'); }); }
    if (domDtabAttrsEl)  { domDtabAttrsEl.addEventListener('click',  function () { switchDetailTab('attrs');  }); }

    // Styles property filter
    if (domStylesFilterEl) {
      domStylesFilterEl.addEventListener('input', function () {
        domStylesFilterQuery = domStylesFilterEl.value.trim();
        domFilterStyles();
      });
      domStylesFilterEl.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { domStylesFilterEl.value = ''; domStylesFilterQuery = ''; domFilterStyles(); }
      });
    }
  }

  // ── Connection state machine ──────────────────────────────────────────────

  /**
   * Transitions to a new connection state and updates all UI surfaces.
   *
   * @param {string} newState  'waiting' | 'connected' | 'disconnected'
   */
  function applyState(newState) {
    var prev  = connState;
    connState = newState;

    // Logo dot
    logoDot.dataset.state = newState;

    // Pill text
    var pillText;
    if (newState === 'connected') {
      pillText = buildPillText(lastDevice);
    } else if (newState === 'disconnected' && lastDevice) {
      pillText = buildPillText(lastDevice) + ' (disconnected)';
    } else {
      pillText = 'Waiting for device\u2026';
    }

    [
      { pill: topbarPill, dot: topbarDot, text: topbarText },
      { pill: tabbarPill, dot: tabbarDot, text: tabbarText },
    ].forEach(function (p) {
      p.pill.dataset.state = newState;
      p.dot.dataset.state  = newState;
      p.text.textContent   = pillText;
    });

    // Topbar buttons — enabled only when connected (§9.3)
    var disabled = newState !== 'connected';
    [btnReload, btnDisconnect].forEach(function (btn) {
      btn.setAttribute('aria-disabled', String(disabled));
    });

    // Reconnect notice bar — visible only in disconnected state (§10.3)
    reconnectBar.hidden = (newState !== 'disconnected');

    // Empty states for all tabs
    TAB_IDS.forEach(function (id) { updateEmptyState(id, newState); });

    // Device grid: show on connect, keep on disconnect, hide on waiting
    if (!deviceGrid) { deviceGrid = document.getElementById('device-grid'); }
    if (newState === 'connected') {
      populateDeviceTab(lastDevice);
      if (deviceGrid) { deviceGrid.removeAttribute('hidden'); }
    } else if (newState === 'waiting') {
      if (deviceGrid) { deviceGrid.setAttribute('hidden', ''); }
    }

    // Console pane: show on connect, keep on disconnect, hide on waiting
    if (!consolePaneEl) { consolePaneEl = document.getElementById('console-pane'); }
    if (newState === 'connected') {
      consoleInitUI();
      if (consolePaneEl) { consolePaneEl.removeAttribute('hidden'); }
      consoleRenderList();
    } else if (newState === 'waiting') {
      if (consolePaneEl) { consolePaneEl.setAttribute('hidden', ''); }
    }

    // Touch content: show on connect, keep on disconnect, hide on waiting
    if (!touchContentEl) { touchContentEl = document.getElementById('touch-content'); }
    if (newState === 'connected') {
      if (touchContentEl) { touchContentEl.removeAttribute('hidden'); }
      touchInitUI();
      touchResize();
    } else if (newState === 'waiting') {
      if (touchContentEl) { touchContentEl.setAttribute('hidden', ''); }
    }

    // DOM content: show on connect, keep on disconnect, hide on waiting
    if (!domContentEl) { domContentEl = document.getElementById('dom-content'); }
    if (newState === 'connected') {
      if (domContentEl) { domContentEl.removeAttribute('hidden'); }
      domInitUI();
    } else if (newState === 'waiting') {
      if (domContentEl) { domContentEl.setAttribute('hidden', ''); }
      if (domLoadingTimer !== null) { clearTimeout(domLoadingTimer); domLoadingTimer = null; }
    }

    // Network pane: show on connect, keep on disconnect, hide on waiting
    if (!networkPaneEl) { networkPaneEl = document.getElementById('network-pane'); }
    if (newState === 'connected') {
      networkInitUI();
      if (networkPaneEl) { networkPaneEl.removeAttribute('hidden'); }
      networkRenderList();
    } else if (newState === 'waiting') {
      if (networkPaneEl) { networkPaneEl.setAttribute('hidden', ''); }
    }

    // ARIA live announcement (§13)
    // pendingPhoneAnnounce defers 'Phone connected' until real dimensions arrive,
    // so screen readers never hear 'Phone connected: Waiting for device…'.
    if (newState === 'connected') {
      if (prev !== 'connected') { pendingPhoneAnnounce = true; }
      if (pendingPhoneAnnounce && lastDevice && lastDevice.width) {
        ariaStatus.textContent = 'Phone connected: ' + pillText;
        pendingPhoneAnnounce = false;
      }
    } else if (newState === 'disconnected') {
      pendingPhoneAnnounce = false;
      ariaStatus.textContent = 'Phone disconnected \u2014 attempting to reconnect';
    } else if (prev !== 'waiting') {
      pendingPhoneAnnounce = false;
      ariaStatus.textContent = 'Waiting for phone';
    }
  }

  // ── Tab switching ─────────────────────────────────────────────────────────

  /**
   * Activates the given tab and hides all others.
   *
   * @param {string} tabId
   */
  function activateTab(tabId) {
    TAB_IDS.forEach(function (id) {
      var isActive = (id === tabId);
      tabEls[id].setAttribute('aria-selected', String(isActive));
      tabEls[id].setAttribute('tabindex', isActive ? '0' : '-1');
      if (isActive) { panelEls[id].removeAttribute('hidden'); }
      else          { panelEls[id].setAttribute('hidden', ''); }
    });
    activeTab = tabId;
    // Reset Console unread badge when Console tab is activated (§11)
    if (tabId === 'console') {
      consoleUnread = 0;
      consoleUpdateBadge();
    }
    // Reset Network unread badge when Network tab is activated
    if (tabId === 'network') {
      networkUnread = 0;
      networkUpdateBadge();
    }
    // Re-run touchResize when switching to Touch — the panel was display:none when
    // the canvas was first sized, so offsetWidth/offsetHeight were 0 at that point.
    if (tabId === 'touch') { touchResize(); }
  }

  TAB_IDS.forEach(function (id) {
    tabEls[id].addEventListener('click', function () { activateTab(id); });

    // Arrow-key navigation within tablist (§13)
    tabEls[id].addEventListener('keydown', function (e) {
      var idx = TAB_IDS.indexOf(id);
      var next = null;
      if (e.key === 'ArrowRight') { next = (idx + 1) % TAB_IDS.length; }
      if (e.key === 'ArrowLeft')  { next = (idx - 1 + TAB_IDS.length) % TAB_IDS.length; }
      if (next !== null) {
        e.preventDefault();
        activateTab(TAB_IDS[next]);
        tabEls[TAB_IDS[next]].focus();
      }
    });
  });

  // ── Topbar button handlers ────────────────────────────────────────────────

  btnReload.addEventListener('click', function () {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reload' }));
    }
  });

  btnDisconnect.addEventListener('click', function () {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'disconnect_phone' }));
    }
    lastDevice = null;
    applyState('waiting');
  });

  // ── WebSocket bridge connection ───────────────────────────────────────────

  var ws = null;

  function connect() {
    ws = new WebSocket('ws://localhost:' + BRIDGE_PORT);

    ws.onopen = function () {
      ws.send(JSON.stringify({ type: 'identify', role: 'devtools' }));
    };

    ws.onmessage = function (event) {
      var msg;
      try { msg = JSON.parse(event.data); } catch (e) { return; }
      if (msg.type === 'phone_connected' || msg.type === 'phone_reconnected') {
        if (msg.type === 'phone_reconnected') {
          if (!preserveLogs)    { consoleClearLogs(); }
          if (!networkPreserve) { networkClearRequests(); }
        }
        applyState('connected');
      } else if (msg.type === 'dimensions') {
        lastDevice = msg;
        applyState('connected');
      } else if (msg.type === 'phone_disconnected') {
        applyState('disconnected');
      } else if (msg.type === 'console') {
        consoleAddLog(msg);
      } else if (msg.type === 'touch') {
        touchHandleEvent(msg);
      } else if (msg.type === 'dom') {
        domHandleSnapshot(msg.html);
      } else if (msg.type === 'styles') {
        domHandleStyles(msg);
      } else if (msg.type === 'network_request_start') {
        networkAddRequest(msg);
      } else if (msg.type === 'network_request_done') {
        networkUpdateRequest(msg);
      } else if (msg.type === 'network_request_error') {
        networkErrorRequest(msg);
      }
    };

    ws.onclose = function () { setTimeout(connect, 2000); };
    ws.onerror = function () {};
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  applyState('waiting');
  connect();
</script>
