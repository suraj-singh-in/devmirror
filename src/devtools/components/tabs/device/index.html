<div class="empty-state" id="empty-device">
  <i class="ti ti-device-mobile-off" aria-hidden="true"></i>
  <div class="empty-heading">Waiting for phone</div>
  <div class="empty-body">Scan the QR code in your terminal to connect</div>
</div>

<!-- Card grid — shown when phone is connected (§8.3) -->
<div class="device-grid" id="device-grid" hidden>
  <div class="metric-card">
    <div class="card-label">Screen</div>
    <div class="card-value" id="card-screen">&mdash;</div>
  </div>
  <div class="metric-card">
    <div class="card-label">Viewport</div>
    <div class="card-value" id="card-viewport">&mdash;</div>
  </div>
  <div class="metric-card">
    <div class="card-label">DPR</div>
    <div class="card-value" id="card-dpr">&mdash;</div>
  </div>
  <div class="metric-card">
    <div class="card-label">OS / Browser</div>
    <div class="card-value" id="card-os">&mdash;</div>
  </div>
  <div class="metric-card card-full">
    <div class="card-label">User Agent</div>
    <div class="card-value-mono" id="card-ua">&mdash;</div>
  </div>
</div>
